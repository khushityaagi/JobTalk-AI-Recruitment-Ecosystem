<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB-TALK | Recruiter Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Color Palette */
            --primary-color: #6366f1; /* Modern Indigo */
            --primary-hover: #4f46e5;
            --bg-gray: #f1f5f9; /* Softer slate background */
            --text-dark: #0f172a; /* Deep slate text */
            --text-muted: #64748b;
            --match-green: #10b981; /* Vibrant Emerald */
            --match-bg: #ecfdf5;
            --card-border: #e2e8f0;
            --accent-glow: rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-gray); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px; 
        }
        
        .dashboard-container { 
            width: 100%; 
            max-width: 1100px; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px; 
        }
        
        /* Left Panel - Search */
        .search-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 40px;
        }
        
        h1 { font-size: 24px; margin-bottom: 24px; color: var(--text-dark); font-weight: 700; letter-spacing: -0.025em; }
        .search-card label { display: block; margin-bottom: 12px; color: var(--text-muted); font-size: 14px; line-height: 1.5; font-weight: 500; }
        
        textarea { 
            width: 100%; 
            padding: 20px; 
            border: 2px solid var(--card-border); 
            border-radius: 12px; 
            outline: none; 
            height: 300px; 
            resize: none; 
            margin-bottom: 24px; 
            font-size: 15px; 
            color: var(--text-dark);
            transition: all 0.2s;
        }
        textarea:focus { 
            border-color: var(--primary-color); 
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        
        .btn { 
            width: 100%; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px); 
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); 
        }
        
        .status { margin-top: 20px; text-align: center; color: var(--primary-color); font-size: 14px; font-weight: 600; }

        /* Right Panel - Results */
        .results-section { 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            max-height: 85vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        .results-section::-webkit-scrollbar { width: 6px; }
        .results-section::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        .candidate-card { 
            background: white; 
            padding: 20px 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--match-green); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.2s ease;
        }
        .candidate-card:hover { 
            transform: translateX(4px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .candidate-info h3 { font-size: 15px; color: var(--text-dark); margin-bottom: 4px; font-weight: 600; }
        .candidate-info p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .candidate-info p span { color: var(--primary-color); font-weight: 700; }

        .match-score-badge { 
            background: var(--match-bg); 
            padding: 10px 18px; 
            border-radius: 12px; 
            text-align: center;
            min-width: 100px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .match-score-badge .score { color: var(--match-green); font-weight: 800; font-size: 16px; display: block; }
        .match-score-badge .label { color: var(--match-green); font-size: 11px; font-weight: 700; display: block; text-transform: uppercase; }

        .placeholder-text {
            text-align: center;
            color: var(--text-muted);
            padding: 100px 40px;
            background: white;
            border-radius: 20px;
            border: 2px dashed var(--card-border);
        }

        @media (max-width: 850px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .search-card { position: static; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="search-card">
            <h1>Recruiter Dashboard 🔍</h1>
            <label>Paste the Job Description (Requirements, Skills, etc.)</label>
            <textarea id="jobDescription" placeholder="e.g. We are looking for a Data Scientist with 3 years of experience in Python, Machine Learning, SQL, and Pandas..."></textarea>
            <button class="btn" onclick="findCandidates()">Scan 2,000+ Resumes</button>
            <p class="status" id="searchStatus"></p>
        </div>

        <div class="results-section" id="resultsContainer">
            <div class="placeholder-text">
                <p>AI matches will appear here once you scan a job description.</p>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000";

        async function findCandidates() {
            const jobDesc = document.getElementById('jobDescription').value;
            const status = document.getElementById('searchStatus');
            const resultsContainer = document.getElementById('resultsContainer');

            if (!jobDesc.trim()) {
                alert("Please paste a job description to scan!");
                return;
            }

            status.innerText = "Processing Candidate Intelligence...";
            resultsContainer.innerHTML = '<div class="placeholder-text">Analyzing resumes with AI...</div>';

            const formData = new FormData();
            formData.append("job_description", jobDesc);

            try {
                const res = await fetch(`${API}/recruiter_match/`, { method: "POST", body: formData });
                const data = await res.json();

                if (data.error) {
                    status.innerText = "Error: " + data.error;
                    return;
                }

                status.innerText = "Scan complete!";
                
                if (data.top_candidates && data.top_candidates.length > 0) {
                    resultsContainer.innerHTML = data.top_candidates.map((cand, index) => `
                        <div class="candidate-card">
                            <div class="candidate-info">
                                <h3>Rank #${index + 1}: ${cand.candidate_id.replace('.pdf', '')}</h3>
                                <p>Domain: <span>${cand.category}</span></p>
                            </div>
                            <div class="match-score-badge">
                                <span class="score">${cand.match_score}</span>
                                <span class="label">Match</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    resultsContainer.innerHTML = `<div class="placeholder-text">No strong matches found. Try adding more skills.</div>`;
                }

            } catch (err) {
                console.error("Match failed:", err);
                status.innerText = "Connection Failed. Is the backend running?";
                resultsContainer.innerHTML = '<div class="placeholder-text">Failed to connect to AI server.</div>';
            }
        }
    </script>
</body>
</html>
