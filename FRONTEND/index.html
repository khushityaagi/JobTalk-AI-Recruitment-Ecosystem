<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; height: 100vh; background: #0f172a; overflow: hidden; color: white; }

        .main-title {font-size: 32px;text-align: center;color: #38bdf8;font-weight: 700;letter-spacing: 1.5px;margin-bottom: 16px;}
        .main {margin-left: 0;padding: 40px;width: 100%;overflow-y: auto;height: 100vh;}
        .card { background: rgba(30, 41, 59, 0.7);  backdrop-filter: blur(10px); padding: 20px;  border-radius: 20px;   border: 1px solid rgba(255,255,255,0.1);    max-width: 750px;  margin: 10px auto;  box-shadow: 0 10px 30px rgba(0,0,0,0.3);}
        
        h1 {  font-size: 20px; margin-bottom: 12px;color: #38bdf8;}
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }
        
        select, input[type="file"] { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        
        #jobId option:nth-child(n+10) {
            display: none; 
        }

        .btn { width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn:hover { background: #0ea5e9; transform: translateY(-2px); }

        #uploadStatus {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: #38bdf8;
            font-weight: 600;
            letter-spacing: 0.5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .score-text {position: relative;font-size: 24px;font-weight: bold;color: #38bdf8;}
        .analysis-container { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; padding: 25px; border: 1px solid rgba(56, 189, 248, 0.2); margin-top: 25px; animation: fadeIn 0.6s ease-out; }
        .score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .circular-progress { width: 110px; height: 110px; border-radius: 50%; background: conic-gradient(#38bdf8 calc(var(--pgPercentage) * 1%), #334155 0); display: flex; align-items: center; justify-content: center; position: relative; }
        .circular-progress::before { content: ""; position: absolute; width: 80px; height: 80px; border-radius: 50%; background: #1e293b; }
        
        .skill-pill { background: rgba(56, 189, 248, 0.15); color: #38bdf8; padding: 6px 14px; border-radius: 50px; display: inline-block; margin: 4px; font-size: 12px; border: 1px solid rgba(56, 189, 248, 0.3); }
        .boost-badge { display: block; color: #2dd4bf; font-size: 13px; font-weight: 600; margin-top: 15px; }

        .job-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #38bdf8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>

<div class="main">
    <div class="card">
        <h1 class="main-title" >JOB - TALK </h1>
        <p class="tagline">Turn your resume into real job opportunities.</p>
        
        <input type="hidden" id="userId" value="101">

        <label>TARGET JOB ROLE</label>
        <select id="jobId">
            <option value="">-- Choose a Role --</option>
            </select>

        <label>Resume (PDF Only)</label>
        <input type="file" id="resumeFile" accept=".pdf">

        <button class="btn" onclick="uploadResume()">Analyze My Fit</button>
        <button class="btn" onclick="discoverJobs()" style="background: #334155; color: white;">Find Best LinkedIn Matches</button>
        
        <p id="uploadStatus"></p>

        <div id="analysisDashboard"></div>

        <div id="resultsWrapper" style="display: none; margin-top: 25px; border-top: 1px solid #334155; padding-top: 20px;">
            <div id="jobMatchResults"></div>
            
        </div>
    </div>
</div>

<script>
    
</script>

<script>
    const API = "http://localhost:8000";

    window.onload = async () => {
        document.getElementById('userId').value = Math.floor(Math.random() * 100000);
        await loadJobs();
    };

    async function loadJobs() {
    try {
        const res = await fetch(`${API}/get_jobs/`);
        const data = await res.json(); // 'data' now holds {"jobs": [...]}
        
        const select = document.getElementById('jobId');
        select.innerHTML = '<option value="">-- Choose a Role --</option>';

        if (data.jobs) {
            data.jobs.forEach(j => { 
                select.innerHTML += `<option value="${j.id}">${j.title}</option>`; 
            });
        }
    } catch (err) { 
        console.error("Offline or Connection Error"); 
    }
}

    function displayAnalysis(data) {
        const dashboard = document.getElementById('analysisDashboard');

        const rawScore = parseFloat(data.match_score)|| 0;
        const displayScore = Math.max(rawScore, 35); // UI boost

        let label = "";
        if (rawScore > 75) label = "Excellent Match";
        else if (rawScore > 60) label = "Good Match";
        else if (rawScore > 40) label = "Average Match";
        else label = "Low Match";

        dashboard.innerHTML = `
            <div class="analysis-container">
                <div class="score-row">
                    <div>
                        <h3 style="color: #f8fafc; font-size: 18px;">Resume Match Score</h3>
                        <p style="color:#94a3b8; font-size:13px;">${label}</p>
                    </div>

                    <div class="circular-progress" style="--pgPercentage: ${displayScore}">
                        <span class="score-text">${Math.round(rawScore)}%</span>
                    </div>
                </div>
            
                <p style="font-size: 13px; color: #94a3b8; margin-bottom: 8px;">Top Detected Skills:</p>
                <div>
                     ${(data.skills_detected || []).map(s => `<span class="skill-pill">${s}</span>`).join('')}
                </div>
            </div>
        `;
   }

    async function uploadResume() {
        const userId = document.getElementById('userId').value;
        const jobId = document.getElementById('jobId').value;
        const file = document.getElementById('resumeFile').files[0];
        const status = document.getElementById('uploadStatus');

        if (!jobId || !file) return alert("Select role and file!");

        status.innerText = " AI Engine analyzing your profile...";

        const formData = new FormData();
        formData.append("user_id", userId);
        formData.append("job_id", jobId);
        formData.append("file", file);

        try {
            const res = await fetch(`${API}/upload_resume/`, { method: "POST", body: formData });
            const data = await res.json();
        
            status.innerText = "Discovery complete!"; 
        
            displayAnalysis(data); 

        } catch (err) { 
            console.error(err);
            status.innerText = "Connection Error"; 
        }
   }

    async function discoverJobs() {
        const file = document.getElementById('resumeFile').files[0];
        const status = document.getElementById('uploadStatus');
        const results = document.getElementById('jobMatchResults');

        if (!file) return alert("Upload resume first!");
        status.innerText = "AI is scanning top job matches...";

        const formData = new FormData();
        formData.append("file", file);

        try {
            const res = await fetch(`${API}/discover_jobs/`, { method: "POST", body: formData });
            const data = await res.json();

            let html = `<h3 style="margin-bottom: 25px; text-align: center;font-size: 20px;">Relevant Jobs Based on Your Resume</h3>`;
            let report = "JOB-TALK AI CAREER REPORT\n====================\n\n";

            data.recommendations.forEach((job, i) => {
                html += `<div class="job-card"><b>${i + 1}. ${job.title}</b><br><small style="color:#38bdf8">JOB ID: ${job.id}</small><br></div>`;
                report += `Rank #${i+1}: ${job.title} | Score: ${Math.round(job.score)}%\n`;
            });

            results.innerHTML = html;
            results.setAttribute('data-report', report);
            document.getElementById('resultsWrapper').style.display = "block";
            status.innerText = "Discovery complete!";
        } catch (err) { status.innerText = "Error scanning jobs."; }
    }

    
</script>
</body>
</html>
